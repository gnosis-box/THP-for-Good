name: Bug report
description: Something is broken in the app, API, or deployment.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please test in the [Circles playground](https://circles.gnosis.io/playground?url=https://dev.thp.gnosis.box) when the bug involves wallet, PAY, or TRUST.

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - dev (dev.thp.gnosis.box)
        - Circles playground + dev URL
        - Local (`pnpm dev`)
        - Production / other
    validations:
      required: true

  - type: input
    id: wallet
    attributes:
      label: Wallet address (optional)
      description: Circles Safe address if relevant. Do not share private keys.
      placeholder: "0x…"

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open …
        2. Click …
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console / network logs (optional)
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: I can reproduce this outside a cached / stale deploy
          required: false
